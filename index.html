<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>git train — 路線図でわかる Git 入門</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=M+PLUS+1p:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --panel-alt: #0d1220;
    --border: #1e2d45;
    --text: #c9d8f0;
    --dim: #4a6080;
    --accent: #00c8ff;
    --green: #00e676;
    --orange: #ff9800;
    --red: #ff5252;
    --purple: #b388ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'M PLUS 1p', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ========== HEADER ========== */
  header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .logo span { color: var(--green); }

  .header-info {
    margin-left: auto;
    text-align: right;
    min-width: 0;
  }

  .chapter-label {
    font-size: 0.75rem;
    color: var(--text);
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chapter-sub {
    font-size: 0.65rem;
    color: var(--dim);
    white-space: nowrap;
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    transition: width 0.6s ease;
  }

  /* ========== MAIN LAYOUT ========== */
  .game-layout {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- PC: 2カラム --- */
  @media (min-width: 768px) {
    .game-layout {
      flex-direction: row;
    }
    .graph-panel {
      flex: 3;
      border-right: 1px solid var(--border);
      border-bottom: none;
      max-height: none;
    }
    .story-panel {
      flex: 2;
      min-width: 360px;
      max-width: 480px;
    }
  }

  /* ========== GRAPH PANEL ========== */
  .graph-panel {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--panel-alt);
    overflow: hidden;
    min-height: 160px;
    position: relative;
  }

  .graph-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .graph-title {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }

  .graph-toggle {
    display: none;
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
  }

  @media (max-width: 767px) {
    .graph-panel { max-height: 200px; }
    .graph-panel.collapsed { max-height: 40px; overflow: hidden; }
    .graph-panel.collapsed .graph-wrap,
    .graph-panel.collapsed #legend { display: none; }
    .graph-toggle { display: block; }
  }

  .graph-wrap {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg#graph {
    width: 100%;
    max-width: 100%;
    overflow: visible;
  }

  @media (min-width: 768px) {
    svg#graph {
      min-height: 280px;
    }
  }

  #legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  /* ========== STORY PANEL ========== */
  .story-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex: 1;
    min-height: 0;
  }

  .scene-box {
    padding: 20px;
    flex: 1;
    overflow-y: auto;
    border-bottom: 1px solid var(--border);
  }

  .scene-character {
    font-size: 0.68rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    font-family: 'Share Tech Mono', monospace;
  }

  .scene-text {
    font-size: 0.9rem;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
  }

  .scene-text .cmd {
    font-family: 'Share Tech Mono', monospace;
    color: var(--green);
    background: rgba(0,230,118,0.08);
    padding: 1px 5px;
    border-radius: 3px;
  }

  .terminal-output {
    margin-top: 14px;
    padding: 10px 14px;
    background: #050810;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    color: var(--dim);
    white-space: pre;
    overflow-x: auto;
    display: none;
  }

  .terminal-output.show { display: block; }

  /* ========== CHOICES ========== */
  .choices-box {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--panel);
    flex-shrink: 0;
  }

  .choice-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }

  .choice-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,200,255,0.04);
  }

  .choice-btn:active {
    background: rgba(0,200,255,0.08);
  }

  .choice-btn.correct {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,230,118,0.06);
  }

  .choice-btn.wrong {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,82,82,0.06);
  }

  .choice-btn.disabled { pointer-events: none; opacity: 0.3; }

  .choice-prefix {
    color: var(--dim);
    font-size: 0.72rem;
  }

  /* ========== FEEDBACK ========== */
  .feedback-box {
    padding: 12px 16px;
    font-size: 0.8rem;
    line-height: 1.7;
    display: none;
    border-top: 1px solid var(--border);
    background: var(--panel);
    white-space: pre-wrap;
    flex-shrink: 0;
  }

  .feedback-box.show { display: block; }
  .feedback-box.ok { color: var(--green); border-top-color: rgba(0,230,118,0.3); }
  .feedback-box.ng { color: var(--red); border-top-color: rgba(255,82,82,0.3); }

  .next-btn {
    margin: 8px 16px 12px;
    padding: 10px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'M PLUS 1p', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    cursor: pointer;
    border-radius: 4px;
    display: none;
    transition: opacity 0.2s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .next-btn:hover { opacity: 0.85; }
  .next-btn:active { opacity: 0.7; }
  .next-btn.show { display: block; }

  /* ========== TITLE SCREEN ========== */
  #title-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
  }

  .title-logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 3rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    animation: flicker 4s infinite;
  }

  @media (max-width: 480px) {
    .title-logo { font-size: 2.2rem; }
  }

  .title-logo span { color: var(--green); }

  @keyframes flicker {
    0%,93%,100% { opacity: 1; }
    94% { opacity: 0.5; }
    95% { opacity: 1; }
    96% { opacity: 0.6; }
  }

  .title-sub {
    font-size: 0.85rem;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-align: center;
    padding: 0 20px;
  }

  .title-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    margin-top: 16px;
  }

  .start-btn {
    padding: 12px 44px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    cursor: pointer;
    letter-spacing: 0.12em;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .start-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .resume-btn {
    padding: 10px 36px;
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    display: none;
  }

  .resume-btn:hover {
    border-color: var(--text);
    color: var(--text);
  }

  /* ========== CLEAR SCREEN ========== */
  #clear-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }

  #clear-screen.show { display: flex; }

  .clear-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.8rem;
    color: var(--green);
    letter-spacing: 0.08em;
  }

  .clear-sub {
    color: var(--dim);
    font-size: 0.85rem;
    text-align: center;
    padding: 0 20px;
  }

  .stat-row {
    display: flex;
    gap: 40px;
    margin-top: 10px;
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2rem;
    color: var(--accent);
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--dim);
    margin-top: 4px;
  }

  /* ========== SCROLLBAR ========== */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- タイトル画面 -->
<div id="title-screen">
  <div class="title-logo">git<span> train</span></div>
  <div class="title-sub">路線図でわかる Git 入門</div>
  <div class="title-buttons">
    <button class="start-btn" onclick="Engine.start(false)">乗車する</button>
    <button class="resume-btn" id="resume-btn" onclick="Engine.start(true)">前回の続きから</button>
  </div>
</div>

<!-- クリア画面 -->
<div id="clear-screen">
  <div class="clear-title">全路線 開通</div>
  <div class="clear-sub" id="clear-sub">おめでとうございます。すべての章を完了しました。</div>
  <div class="stat-row">
    <div class="stat">
      <div class="stat-num" id="stat-correct">0</div>
      <div class="stat-label">正解</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">問題数</div>
    </div>
  </div>
  <button class="start-btn" onclick="Engine.restart()" style="margin-top:16px">もう一度乗る</button>
</div>

<!-- ヘッダー -->
<header>
  <div class="logo">git<span> train</span></div>
  <div class="header-info">
    <div class="chapter-label" id="chapter-label"></div>
    <div class="chapter-sub" id="chapter-sub"></div>
  </div>
</header>
<div class="progress-bar">
  <div class="progress-fill" id="progress-fill" style="width:0%"></div>
</div>

<!-- ゲーム本体 -->
<div class="game-layout">
  <!-- 路線図 -->
  <div class="graph-panel" id="graph-panel">
    <div class="graph-header">
      <div class="graph-title">路線図</div>
      <button class="graph-toggle" id="graph-toggle" onclick="toggleGraph()">表示/非表示</button>
    </div>
    <div class="graph-wrap">
      <svg id="graph" height="200"></svg>
    </div>
    <div id="legend"></div>
  </div>

  <!-- ストーリー -->
  <div class="story-panel">
    <div class="scene-box">
      <div class="scene-character" id="scene-char"></div>
      <div class="scene-text" id="scene-text"></div>
      <div class="terminal-output" id="terminal-out"></div>
    </div>
    <div class="choices-box" id="choices-box"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button class="next-btn" id="next-btn">次の駅へ</button>
  </div>
</div>

<script src="js/graph.js"></script>
<script src="js/ui.js"></script>
<script src="js/engine.js"></script>
<script>
  function toggleGraph() {
    document.getElementById('graph-panel').classList.toggle('collapsed');
  }
</script>
</body>
</html>
